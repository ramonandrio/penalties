  // ============================================================
  // SECTION 2: CANVAS & SCALING
  // ============================================================
  let canvas, ctx, scale, offsetX, offsetY;

  function initCanvas() {
    canvas = document.getElementById('game');
    ctx = canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', () => setTimeout(resize, 100));
  }

  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const scaleX = w / DESIGN_W;
    const scaleY = h / DESIGN_H;
    scale = Math.min(scaleX, scaleY);
    canvas.width = w;
    canvas.height = h;
    offsetX = (w - DESIGN_W * scale) / 2;
    offsetY = (h - DESIGN_H * scale) / 2;
    ctx.imageSmoothingEnabled = false;
  }

  function beginDraw() {
    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);
  }
  function endDraw() {
    ctx.restore();
  }

  function drawText(text, x, y, ps, color) {
    ctx.fillStyle = color;
    let cx = x;
    for (const ch of text.toUpperCase()) {
      const g = PIXEL_FONT[ch];
      if (!g) { cx += 4 * ps; continue; }
      for (let r = 0; r < g.length; r++) {
        for (let c = 0; c < g[r].length; c++) {
          if (g[r][c] === '1') {
            ctx.fillRect(cx + c * ps, y + r * ps, ps, ps);
          }
        }
      }
      cx += (g[0].length + 1) * ps;
    }
  }

  function measureText(text, ps) {
    let w = 0;
    for (const ch of text.toUpperCase()) {
      const g = PIXEL_FONT[ch];
      if (!g) { w += 4 * ps; continue; }
      w += (g[0].length + 1) * ps;
    }
    return w - ps; // remove trailing gap
  }

  function drawTextCentered(text, y, ps, color) {
    const w = measureText(text, ps);
    drawText(text, (DESIGN_W - w) / 2, y, ps, color);
  }

  // SECTION 4: SOUND ENGINE
  // ============================================================
  let audioCtx = null;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playWhistle() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, t);
    osc.frequency.linearRampToValueAtTime(660, t + 0.25);
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.35);
    // second beep
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(880, t + 0.15);
    osc2.frequency.linearRampToValueAtTime(660, t + 0.4);
    gain2.gain.setValueAtTime(0, t);
    gain2.gain.setValueAtTime(0.25, t + 0.15);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc2.connect(gain2); gain2.connect(audioCtx.destination);
    osc2.start(t + 0.15); osc2.stop(t + 0.5);
  }

  function playKick() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    // thud
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(160, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.15);
    // snap noise
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const n = audioCtx.createBufferSource();
    const ng = audioCtx.createGain();
    n.buffer = buf;
    ng.gain.setValueAtTime(0.3, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    n.connect(ng); ng.connect(audioCtx.destination);
    n.start(t); n.stop(t + 0.08);
  }

  function playCrowdCheer() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const len = 1.2;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const n = audioCtx.createBufferSource();
    n.buffer = buf;
    const f = audioCtx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 1200; f.Q.value = 0.4;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.35, t + 0.08);
    g.gain.setValueAtTime(0.35, t + 0.5);
    g.gain.exponentialRampToValueAtTime(0.001, t + len);
    n.connect(f); f.connect(g); g.connect(audioCtx.destination);
    n.start(t); n.stop(t + len);
  }

    n.buffer = buf;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.4, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    n.connect(g); g.connect(audioCtx.destination);
    n.start(t); n.stop(t + 0.12);

    n.connect(f); f.connect(g); g.connect(audioCtx.destination);

    osc.connect(g); g.connect(audioCtx.destination);

    osc.frequency.exponentialRampToValueAtTime(200, t + 0.3);
    g.gain.setValueAtTime(0.2, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.3);

  // Special shot sounds
  function playCurveWhoosh() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const len = 0.6;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const env = Math.sin(Math.PI * i / d.length);
      d[i] = (Math.random() * 2 - 1) * env;
    }
    const n = audioCtx.createBufferSource();
    n.buffer = buf;
    const f = audioCtx.createBiquadFilter();
    f.type = 'bandpass';
    f.frequency.setValueAtTime(800, t);
    f.frequency.linearRampToValueAtTime(2000, t + len * 0.5);
    f.frequency.linearRampToValueAtTime(600, t + len);
    f.Q.value = 2;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.15, t);
    g.gain.linearRampToValueAtTime(0.3, t + len * 0.3);
    g.gain.exponentialRampToValueAtTime(0.001, t + len);
    n.connect(f); f.connect(g); g.connect(audioCtx.destination);
    n.start(t); n.stop(t + len);
  }

  function playPanenkaChip() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    // Soft chip sound — high pitched short tap
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1200, t);
    osc.frequency.exponentialRampToValueAtTime(800, t + 0.08);
    g.gain.setValueAtTime(0.2, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.12);
    // Crowd "ooooh"
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.8, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const n = audioCtx.createBufferSource();
    n.buffer = buf;
    const f = audioCtx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 500; f.Q.value = 1.5;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0, t + 0.2);
    ng.gain.linearRampToValueAtTime(0.15, t + 0.4);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
    n.connect(f); f.connect(ng); ng.connect(audioCtx.destination);
    n.start(t + 0.2); n.stop(t + 1.0);
  }

  function playParadinhaStop() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    // Screech/brake sound
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(400, t);
    osc.frequency.exponentialRampToValueAtTime(100, t + 0.15);
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.2);
    // Short noise burst
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.06, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const n = audioCtx.createBufferSource();
    n.buffer = buf;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(0.2, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    n.connect(ng); ng.connect(audioCtx.destination);
    n.start(t); n.stop(t + 0.06);
  }

  function vibrateKick()  { vibrate(40); }
  function vibrateGoal()  { vibrate([30, 50, 80]); }
  function vibrateSave()  { vibrate([80, 40, 80]); }
  function vibrateMiss()  { vibrate(120); }

    '....DD...DD.',
    '.....DD..DD.',

    '......GGGG..',
    '.......KKKK.',
    '........KKKK',
  ];

  const GK_DIVE_R2 = [
    '............',

    '......HHHH..',
    '.....HGGGGH.',
    '.....HGGGGRR',
    '......GGGGRR',

  const GK_DIVE_C = [
    '............',

    '....HHHH....',
    '...HGGGGH...',
    '...HGGGGH...',
    '....GGGG....',

    'RYYYYYYYYY..',
    '..YYYYYYYY..',
    '..DDDDDDDD..',
    '..GGGGGGGG..',

  ];

  function drawSprite(spriteData, x, y, ps, flipH) {
    for (let r = 0; r < spriteData.length; r++) {
      const line = spriteData[r];
      for (let c = 0; c < line.length; c++) {
        const key = line[c];
        if (key === '.') continue;
        const color = SP[key];
        if (!color) continue;
        ctx.fillStyle = color;
        const dc = flipH ? (line.length - 1 - c) : c;
        ctx.fillRect(Math.floor(x + dc * ps), Math.floor(y + r * ps), ps, ps);
      }
    }
  }

  // ============================================================
  // SECTION 6: CROWD GENERATION
  // ============================================================
  const crowdColors = [COLORS.crowd1, COLORS.crowd2, COLORS.crowd3, COLORS.crowd4, COLORS.crowd5, COLORS.crowd6];
  let crowdBuffer = [];
  let crowdAnimating = false;
  let crowdAnimTimer = 0;

  function generateCrowd() {
    crowdBuffer = [];
    for (let y = 0; y < 22; y++) {
      const row = [];
      for (let x = 0; x < 90; x++) {
        row.push(crowdColors[Math.floor(Math.random() * crowdColors.length)]);
      }
      crowdBuffer.push(row);
    }
  }

  function animateCrowd() {
    crowdAnimating = true;
    crowdAnimTimer = 60;
  }

  function drawCrowd() {
    const ps = 4;
    const startY = 60;
    for (let r = 0; r < crowdBuffer.length; r++) {
      const row = crowdBuffer[r];
      for (let c = 0; c < row.length; c++) {
        ctx.fillStyle = row[c];
        let yo = 0;
        if (crowdAnimating && crowdAnimTimer > 0) {
          yo = Math.sin((c + r + crowdAnimTimer) * 0.5) * 2;
        }
        ctx.fillRect(c * ps, startY + r * ps + yo, ps, ps);
      }
    }
    if (crowdAnimating) {
      crowdAnimTimer--;
      if (crowdAnimTimer <= 0) crowdAnimating = false;
    }
  }

  // ============================================================
  // SECTION 7: SCENE RENDERING
  // ============================================================
  function drawSky() {
    ctx.fillStyle = COLORS.sky;
    ctx.fillRect(0, 0, DESIGN_W, 150);
    // stadium wall
    ctx.fillStyle = '#484040';
    ctx.fillRect(0, 145, DESIGN_W, 60);
  }

  function drawPitch() {
    const stripeH = 30;
    const startY = GOAL_BOTTOM;
    for (let i = 0; i < 16; i++) {
      ctx.fillStyle = i % 2 === 0 ? COLORS.pitch : COLORS.pitchLight;
      ctx.fillRect(0, startY + i * stripeH, DESIGN_W, stripeH);
    }
    // penalty area lines (perspective trapezoid)
    ctx.strokeStyle = COLORS.white;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(70, GOAL_BOTTOM);
    ctx.lineTo(290, GOAL_BOTTOM);
    ctx.lineTo(330, DESIGN_H);
    ctx.lineTo(30, DESIGN_H);
    ctx.closePath();
    ctx.stroke();

    // penalty spot
    ctx.fillStyle = COLORS.white;
    ctx.beginPath();
    ctx.arc(GOAL_CENTER_X, PENALTY_SPOT_Y, 3, 0, Math.PI * 2);
    ctx.fill();

    // penalty arc (partial)
    ctx.strokeStyle = COLORS.white;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(GOAL_CENTER_X, PENALTY_SPOT_Y, 50, -Math.PI * 0.65, -Math.PI * 0.35);
    ctx.stroke();
  }

  function drawGoalNet() {
    const gl = GOAL_LEFT;
    const gr = GOAL_RIGHT;
    const gt = GOAL_TOP;
    const gb = GOAL_BOTTOM;
    const depth = 25;

    // Net back
    ctx.fillStyle = '#304830';
    ctx.beginPath();
    ctx.moveTo(gl + 10, gt - depth);
    ctx.lineTo(gr - 10, gt - depth);
    ctx.lineTo(gr, gb);
    ctx.lineTo(gl, gb);
    ctx.closePath();
    ctx.fill();

    // Net lines
    ctx.strokeStyle = COLORS.net;
    ctx.lineWidth = 0.8;
    ctx.globalAlpha = 0.5;

    // Vertical net lines
    for (let x = gl; x <= gr; x += 7) {
      const progress = (x - gl) / (gr - gl);
      const topX = gl + 10 + progress * ((gr - 10) - (gl + 10));
      ctx.beginPath();
      ctx.moveTo(x, gb);
      ctx.lineTo(topX, gt - depth);
      ctx.stroke();
    }
    // Horizontal net lines
    for (let i = 0; i < 7; i++) {
      const t = i / 6;
      const y = gb - t * (gb - gt + depth);
      const lx = gl + t * 10;
      const rx = gr - t * 10;
      ctx.beginPath();
      ctx.moveTo(lx, y);
      ctx.lineTo(rx, y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Net ripple effect
    if (netRipple.active) {
      ctx.strokeStyle = '#f0f0f0';
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.4 * (1 - netRipple.time / 40);
      const r = netRipple.time * 3;
      ctx.beginPath();
      ctx.arc(netRipple.x, netRipple.impactY, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(netRipple.x, netRipple.impactY, r * 0.6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  function drawGoalPosts() {
    ctx.fillStyle = COLORS.goalPost;
    // Left post
    ctx.fillRect(GOAL_LEFT - GOAL_POST_W, GOAL_TOP, GOAL_POST_W, GOAL_BOTTOM - GOAL_TOP);
    // Right post
    ctx.fillRect(GOAL_RIGHT, GOAL_TOP, GOAL_POST_W, GOAL_BOTTOM - GOAL_TOP);
    // Crossbar
    ctx.fillRect(GOAL_LEFT - GOAL_POST_W, GOAL_TOP - 3, GOAL_RIGHT - GOAL_LEFT + GOAL_POST_W * 2, 5);
    // Post shadows (inner)
    ctx.fillStyle = '#b0b0b0';
    ctx.fillRect(GOAL_LEFT, GOAL_TOP, 2, GOAL_BOTTOM - GOAL_TOP);
    ctx.fillRect(GOAL_RIGHT - 2, GOAL_TOP, 2, GOAL_BOTTOM - GOAL_TOP);
  }

  // ============================================================
  // SECTION 8: GAME ENTITIES
  // ============================================================
  const ball = {
    x: GOAL_CENTER_X, y: PENALTY_SPOT_Y, z: 0,
    vx: 0, vy: 0, vz: 0, curve: 0,
    radius: 5, visible: true, inFlight: false,
    startX: 0, startY: 0,
  };

  const kicker = {
    x: GOAL_CENTER_X, y: KICKER_START_Y, frame: 'stand',
  };

  const gk = {
    x: GOAL_CENTER_X, y: GOAL_LINE_Y - 10,
    baseX: GOAL_CENTER_X,
    frame: 'ready', diveDir: 0, diveProgress: 0,
    diveIntensity: 1,
  };

  let netRipple = { active: false, x: 0, impactY: 0, time: 0 };
  let particles = [];
  let flashTimer = 0;
  let currentShot = null;
  let currentGKDecision = null;
  let ballTrail = []; // for curve shot visual trail

  // Paradinha state
  let paradinhaActive = false;
  let paradinhaUsed = false;
  let paradinhaFrame = 0;
  let paradinhaPauseTimer = 0;
  let paradinhaGKAnticipation = 0; // how far GK has committed during paradinha

  // Slow-motion state
  let slowMoActive = false;
  let slowMoCounter = 0;

  function resetPositions() {
    ball.x = GOAL_CENTER_X; ball.y = PENALTY_SPOT_Y; ball.z = 0;
    ball.vx = 0; ball.vy = 0; ball.vz = 0; ball.curve = 0;
    ball.inFlight = false; ball.visible = true;
    ball.startX = GOAL_CENTER_X; ball.startY = PENALTY_SPOT_Y;

    kicker.x = GOAL_CENTER_X; kicker.y = KICKER_START_Y; kicker.frame = 'stand';

    gk.x = GOAL_CENTER_X; gk.baseX = GOAL_CENTER_X;
    gk.frame = 'ready'; gk.diveDir = 0; gk.diveProgress = 0;

    netRipple.active = false;
    particles = [];
    flashTimer = 0;
    ballTrail = [];

    // Reset paradinha state
    paradinhaActive = false;
    paradinhaUsed = false;
    paradinhaFrame = 0;
    paradinhaPauseTimer = 0;
    paradinhaGKAnticipation = 0;

    // Reset slow-mo
    slowMoActive = false;
    slowMoCounter = 0;
  }

  // ============================================================
  // SECTION 9: INPUT HANDLER
  // ============================================================
  const input = {
    active: false,
    startX: 0, startY: 0,
    endX: 0, endY: 0,
    startTime: 0,
    swipeReady: false,
    path: [],         // array of {x, y, t} sampled during swipe
    lastPathTime: 0,  // last time a path point was recorded
  };

  function initInput() {
    canvas.addEventListener('touchstart', onDown, { passive: false });
    canvas.addEventListener('touchmove', onMove, { passive: false });
    canvas.addEventListener('touchend', onUp, { passive: false });
    canvas.addEventListener('touchcancel', onUp, { passive: false });
    canvas.addEventListener('mousedown', onDown);
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseup', onUp);
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    let cx, cy;
    if (e.touches && e.touches.length > 0) {
      cx = e.touches[0].clientX; cy = e.touches[0].clientY;
    } else if (e.changedTouches && e.changedTouches.length > 0) {
      cx = e.changedTouches[0].clientX; cy = e.changedTouches[0].clientY;
    } else {
      cx = e.clientX; cy = e.clientY;
    }
    return {
      x: (cx - rect.left - offsetX) / scale,
      y: (cy - rect.top - offsetY) / scale,
    };
  }

  function onDown(e) {
    e.preventDefault();
    if (gameState === 'TITLE') {
      initAudio();
      startGame();
      return;
    }
    if (gameState === 'GAME_OVER') {
      changeState('TITLE');
      return;
    }
    // Paradinha: tap during RUNUP to pause the kicker
    if (gameState === 'RUNUP' && !paradinhaUsed &&
        stateTimer > PARADINHA_MIN_FRAME && stateTimer < PARADINHA_MAX_FRAME) {
      paradinhaActive = true;
      paradinhaUsed = true;
      paradinhaFrame = stateTimer;
      paradinhaPauseTimer = 0;
      playParadinhaStop();
      return;
    }
    if (gameState !== 'READY') return;
    const p = getPos(e);
    input.active = true;
    input.startX = p.x; input.startY = p.y;
    input.endX = p.x; input.endY = p.y;
    input.startTime = performance.now();
    input.swipeReady = false;
    input.path = [{x: p.x, y: p.y, t: performance.now()}];
    input.lastPathTime = performance.now();
  }

  function onMove(e) {
    e.preventDefault();
    if (!input.active) return;
    const p = getPos(e);
    input.endX = p.x; input.endY = p.y;
    // Sample path points every ~30ms, max 30 points
    const now = performance.now();
    if (now - input.lastPathTime > 30 && input.path.length < 30) {
      input.path.push({x: p.x, y: p.y, t: now});
      input.lastPathTime = now;
    }
  }

  function onUp(e) {
    e.preventDefault();
    // Release paradinha pause
    if (paradinhaActive && gameState === 'RUNUP') {
      paradinhaActive = false;
      return;
    }
    if (!input.active) return;
    input.active = false;
    const p = getPos(e);
    input.endX = p.x; input.endY = p.y;
    // Add final point to path
    input.path.push({x: p.x, y: p.y, t: performance.now()});

    const dx = input.endX - input.startX;
    const dy = input.endY - input.startY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist >= SWIPE_MIN_DIST && dy < -10) {
      input.swipeReady = true;
    }
  }

  // ============================================================
  // SECTION 10: SHOT CALCULATION
  // ============================================================
  // Detect curvature from the swipe path
  function calculatePathCurvature() {
    if (input.path.length < 4) return { perpDist: 0, curveSign: 0 };
    const start = input.path[0];
    const end = input.path[input.path.length - 1];
    const lineDx = end.x - start.x;
    const lineDy = end.y - start.y;
    const lineLen = Math.sqrt(lineDx * lineDx + lineDy * lineDy);
    if (lineLen < 10) return { perpDist: 0, curveSign: 0 };

    // Find the point with maximum perpendicular distance from start→end line
    let maxDist = 0;
    let maxSign = 0;
    for (let i = 1; i < input.path.length - 1; i++) {
      const p = input.path[i];
      // Perpendicular distance from point to line (start→end)
      const d = ((end.x - start.x) * (start.y - p.y) - (start.x - p.x) * (end.y - start.y)) / lineLen;
      if (Math.abs(d) > Math.abs(maxDist)) {
        maxDist = d;
        maxSign = d > 0 ? 1 : -1;
      }
    }
    return { perpDist: Math.abs(maxDist), curveSign: maxSign };
  }

  function detectShotType(dx, dy, dist, elapsed, angleRatio) {
    // Check for curve: swipe path has significant curvature
    const { perpDist, curveSign } = calculatePathCurvature();
    if (perpDist > CURVE_MIN_PERP_DIST && dist > 40) {
      return { type: 'curve', perpDist, curveSign };
    }
    // Check for panenka: short, slow, centered swipe
    if (dist < PANENKA_MAX_DIST && elapsed > PANENKA_MIN_TIME && Math.abs(angleRatio) < PANENKA_MAX_ANGLE) {
      return { type: 'panenka' };
    }
    return { type: 'normal' };
  }

  function calculateShot() {
    const dx = input.endX - input.startX;
    const dy = input.endY - input.startY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const elapsed = performance.now() - input.startTime;

    const normDist = Math.min(dist, SWIPE_MAX_DIST) / SWIPE_MAX_DIST;
    const power = BALL_SPEED_MIN + normDist * (BALL_SPEED_MAX - BALL_SPEED_MIN);

    // Swipe angle: 0 = straight up, negative = left, positive = right
    const swipeAngle = Math.atan2(dx, -dy);
    const maxAngle = Math.PI / 3;
    const angleRatio = Math.max(-1, Math.min(1, swipeAngle / maxAngle));

    // Detect shot type
    const shotInfo = detectShotType(dx, dy, dist, elapsed, angleRatio);

    if (shotInfo.type === 'panenka') {
      // Panenka: slow chip to center, high arc
      const targetX = GOAL_CENTER_X + (Math.random() - 0.5) * 10;
      const heightRatio = 0.75 + Math.random() * 0.1;
      return {
        targetX, power: power * 0.6, curve: 0,
        heightRatio, angleRatio,
        shotType: 'panenka',
        apparentTargetX: targetX, // for GK: doesn't matter, GK always dives
        flightFrames: 55, // slower flight
      };
    }

    if (shotInfo.type === 'curve') {
      // Curve shot: ball appears to go one direction but curves to another
      const targetRange = (GOAL_RIGHT - GOAL_LEFT) / 2 + 50;
      const scatter = (Math.random() - 0.5) * 15 * Math.abs(angleRatio);
      // The apparent direction is where the swipe points (start→end straight line)
      const apparentTargetX = GOAL_CENTER_X + angleRatio * targetRange + scatter;
      // The curve magnitude (0.02 to 0.05) based on perpendicular distance
      const curveMag = Math.min(0.05, 0.02 + (shotInfo.perpDist - CURVE_MIN_PERP_DIST) * 0.001);
      const curveVal = curveMag * shotInfo.curveSign;
      // The effective target is shifted by the curve
      const curveShift = curveVal * BALL_FLIGHT_FRAMES * (BALL_FLIGHT_FRAMES / 2);
      const curveScatter = (Math.random() - 0.5) * 20;
      const effectiveTargetX = apparentTargetX + curveShift + curveScatter;
      const heightRatio = normDist * 0.45 + 0.05 + Math.random() * 0.18;
      const speedBonus = Math.max(0, 1 - elapsed / 400) * 0.2;

      return {
        targetX: effectiveTargetX,
        apparentTargetX,
        power: power * (1 + speedBonus), curve: curveVal,
        heightRatio, angleRatio,
        shotType: 'curve',
        flightFrames: BALL_FLIGHT_FRAMES,
      };
    }

    // Normal shot
    const targetRange = (GOAL_RIGHT - GOAL_LEFT) / 2 + 50;
    const scatter = (Math.random() - 0.5) * 25 * Math.abs(angleRatio);
    const targetX = GOAL_CENTER_X + angleRatio * targetRange + scatter;
    const curve = swipeAngle * CURVE_FACTOR * 0.5;
    const speedBonus = Math.max(0, 1 - elapsed / 400) * 0.2;
    const heightRatio = normDist * 0.55 + 0.03 + Math.random() * 0.2;

    return {
      targetX, power: power * (1 + speedBonus), curve,
      heightRatio, angleRatio,
      shotType: 'normal',
      apparentTargetX: targetX,
      flightFrames: BALL_FLIGHT_FRAMES,
    };
  }

  function launchBall(shot) {
    const distY = ball.y - (GOAL_LINE_Y - 5);
    const frames = shot.flightFrames || BALL_FLIGHT_FRAMES;
    ball.vy = -distY / frames;
    ball.flightFrames = frames;

    if (shot.shotType === 'curve') {
      // For curve: initial vx aims at apparentTargetX, curve bends it
      ball.vx = (shot.apparentTargetX - ball.x) / frames;
      ball.curve = shot.curve;
    } else {
      ball.vx = (shot.targetX - ball.x) / frames;
      ball.curve = shot.curve;
    }

    ball.vz = shot.heightRatio * 2.2;

    // Panenka: softer launch
    if (shot.shotType === 'panenka') {
      ball.vz = shot.heightRatio * 1.8; // slightly lower initial velocity, but longer flight = higher arc
    }

    ball.inFlight = true;
    ball.startX = ball.x;
    ball.startY = ball.y;
    ball.shotType = shot.shotType;
    ballTrail = [];
  }

  // ============================================================
  // SECTION 11: GOALKEEPER AI
  // ============================================================
  function decideGKDive(shot, isParadinha) {
    // Panenka: GK always commits to a side (never center)
    if (shot.shotType === 'panenka') {
      const dir = Math.random() < 0.5 ? -1 : 1;
      const intensity = 0.7 + Math.random() * 0.3;
      return { direction: dir, intensity };
    }

    // For curve shots: GK reads the APPARENT direction (not the effective one)
    const readTargetX = shot.apparentTargetX || shot.targetX;

    const r = Math.random();
    let dir;
    if (r < gkCorrectGuessRate) {
      if (readTargetX < GOAL_CENTER_X - 15) dir = -1;
      else if (readTargetX > GOAL_CENTER_X + 15) dir = 1;
      else dir = 0;
    } else {
      const choices = [-1, 0, 1];
      dir = choices[Math.floor(Math.random() * 3)];
    }

    let intensity;
    if (r < gkCorrectGuessRate && dir !== 0) {
      const shotDist = Math.abs(readTargetX - GOAL_CENTER_X);
      const goalHalfW = (GOAL_RIGHT - GOAL_LEFT) / 2;
      intensity = Math.min(1, (shotDist / goalHalfW) * (0.7 + Math.random() * 0.5));
    } else {
      intensity = 0.4 + Math.random() * 0.6;
    }

    // Paradinha penalty: GK already committed, reduce reach
    if (isParadinha) {
      intensity *= 0.5;
    }

    // After streak 10, GK dives harder
    if (game.streak > 10) {
      intensity *= (1 + (game.streak - 10) * 0.02);
    }

    return {
      direction: dir,
      intensity: Math.min(intensity, 1.3),
    };
  }

  function checkResult() {
    const bx = ball.x;
    const bz = ball.z;

    // Goal dimensions (in design units):
    // Posts at GOAL_LEFT (105) and GOAL_RIGHT (255) → inner width = 150
    // Crossbar height ≈ 28 in Z units (ball.z scale)
    const postInnerL = GOAL_LEFT + 3;
    const postInnerR = GOAL_RIGHT - 3;
    const crossbarZ = 28; // max height for a goal

    const inGoalH = bx > postInnerL && bx < postInnerR;
    const underBar = bz < crossbarZ;

    // Hit post?
    const hitLeftPost = bx >= GOAL_LEFT - 3 && bx <= postInnerL && bz < crossbarZ;
    const hitRightPost = bx >= postInnerR && bx <= GOAL_RIGHT + 3 && bz < crossbarZ;
    const hitCrossbar = inGoalH && bz >= crossbarZ && bz < crossbarZ + 5;

    if (hitLeftPost || hitRightPost || hitCrossbar) {
      playPostSound();
      return 'miss';
    }

    // Ball went wide or over
    if (!inGoalH || !underBar) {
      return 'miss';
    }

    // Ball is inside goal frame — check GK save
    const reach = GK_REACH * gk.diveProgress * gk.diveIntensity;
    const gkEffX = gk.baseX + gk.diveDir * reach;
    const dx = Math.abs(bx - gkEffX);

    // GK save zone — balanced for fun gameplay
    let saveThresholdH, saveThresholdV;
    if (gk.diveDir === 0) {
      // staying center: small block zone
      saveThresholdH = 10;
      saveThresholdV = 15;
    } else {
      // diving to a side: moderate reach
      saveThresholdH = 18;
      saveThresholdV = 13;
    }

    // High shots are harder to save (GK can't reach up while diving)
    if (bz > 12) {
      saveThresholdH *= 0.5;
      saveThresholdV *= 0.6;
    }

    if (dx < saveThresholdH && bz < saveThresholdV) {
      // Special case: panenka to center + GK stayed center = always save
      if (ball.shotType === 'panenka' && gk.diveDir === 0) {
        return 'save';
      }
      return 'save';
    }

    return 'goal';
  }

  // ============================================================
  // SECTION 12: PARTICLES & EFFECTS
  // ============================================================
  function spawnCelebration() {
    for (let i = 0; i < 50; i++) {
      particles.push({
        x: GOAL_CENTER_X + (Math.random() - 0.5) * 160,
        y: 140 + Math.random() * 60,
        vx: (Math.random() - 0.5) * 5,
        vy: -1 - Math.random() * 4,
        color: ['#e84040','#4040e8','#e8e840','#40e840','#f8f8f8','#e88020'][Math.floor(Math.random() * 6)],
        life: 50 + Math.random() * 50,
        size: 2 + Math.floor(Math.random() * 3),
      });
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.min(1, p.life / 15);
      ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  function triggerNetRipple(impactX, impactY) {
    netRipple.active = true;
    netRipple.x = impactX;
    netRipple.impactY = impactY || GOAL_LINE_Y - 20;
    netRipple.time = 0;
  }

  // ============================================================
  // SECTION 13: GAME STATE MACHINE
  // ============================================================
  let gameState = 'TITLE';
  let stateTimer = 0;
  let stateData = {};
  let titleAnimTimer = 0;

  const game = {
    streak: 0,
    totalShots: 0,
    totalGoals: 0,
    results: [],
    specialCounts: { curve: 0, panenka: 0, paradinha: 0 },
    highScore: 0,
    bestStreak: 0,
  };

  function loadHighScores() {
    try {
      game.highScore = parseInt(localStorage.getItem(LS_HIGH_SCORE)) || 0;
      game.bestStreak = parseInt(localStorage.getItem(LS_BEST_STREAK)) || 0;
    } catch (e) { /* localStorage not available */ }
  }

  function saveHighScores() {
    let isNewBest = false;
    if (game.totalGoals > game.highScore) {
      game.highScore = game.totalGoals;
      isNewBest = true;
    }
    if (game.streak > game.bestStreak) {
      game.bestStreak = game.streak;
    }
    try {
      localStorage.setItem(LS_HIGH_SCORE, game.highScore);
      localStorage.setItem(LS_BEST_STREAK, game.bestStreak);
    } catch (e) { /* localStorage not available */ }
    return isNewBest;
  }

  function changeState(newState) {
    gameState = newState;
    stateTimer = 0;
    stateData = {};
    onEnter(newState);
  }

  function onEnter(state) {
    switch (state) {
      case 'TITLE':
        generateCrowd();
        titleAnimTimer = 0;
        break;
      case 'ROUND_START':
        resetPositions();
        gkCorrectGuessRate = Math.min(GK_MAX_GUESS_RATE, GK_BASE_GUESS_RATE + game.streak * GK_GUESS_RATE_INCREMENT);
        playWhistle();
        break;
      case 'READY':
        gk.frame = 'ready';
        break;
      case 'RUNUP':
        currentShot = calculateShot();
        // Don't decide GK dive yet — wait until later in RUNUP or after paradinha
        currentGKDecision = null;
        gk.diveProgress = 0;
        break;
      case 'KICK':
        playKick();
        vibrateKick();
        // If paradinha was used, recalculate with paradinha advantage
        if (paradinhaUsed && !currentGKDecision) {
          // GK already revealed direction during paradinha; now lock it in with penalty
          currentGKDecision = decideGKDive(currentShot, true);
        }
        if (!currentGKDecision) {
          currentGKDecision = decideGKDive(currentShot, false);
        }
        gk.diveDir = currentGKDecision.direction;
        gk.diveIntensity = currentGKDecision.intensity;
        launchBall(currentShot);
        // Play special shot sounds
        if (currentShot.shotType === 'curve') playCurveWhoosh();
        if (currentShot.shotType === 'panenka') playPanenkaChip();
        break;
      case 'BALL_FLIGHT':
        stateData.gkDiveStart = 8; // frames delay
        stateData.physicsFrames = 0;
        break;
      case 'RESULT':
        stateData.result = checkResult();
        stateData.shotType = currentShot ? currentShot.shotType : 'normal';
        game.totalShots++;
        const effectiveShotType = paradinhaUsed ? 'paradinha' : stateData.shotType;
        if (stateData.result === 'goal') {
          game.streak++;
          game.totalGoals++;
          game.results.push({ result: 'goal', shotType: effectiveShotType });
          if (effectiveShotType !== 'normal') game.specialCounts[effectiveShotType]++;
          playCrowdCheer(); playNetSound(); vibrateGoal();
          spawnCelebration(); animateCrowd();
          triggerNetRipple(ball.x, ball.y - ball.z * 1.5);
          flashTimer = 8;
        } else if (stateData.result === 'save') {
          game.results.push({ result: 'save', shotType: effectiveShotType });
          playSaveSound(); vibrateSave();
        } else {
          game.results.push({ result: 'miss', shotType: effectiveShotType });
          playMissSound(); vibrateMiss();
        }
        break;
      case 'GAME_OVER':
        stateData.isNewBest = saveHighScores();
        break;
    }
  }

  function startGame() {
    game.streak = 0; game.totalShots = 0; game.totalGoals = 0;
    game.results = []; game.specialCounts = { curve: 0, panenka: 0, paradinha: 0 };
    gkCorrectGuessRate = GK_BASE_GUESS_RATE;
    generateCrowd();
    changeState('ROUND_START');
  }

  function advanceGame() {
    if (stateData.result === 'goal') {
      changeState('ROUND_START');
    } else {
      changeState('GAME_OVER');
    }
  }

  // ============================================================
  // SECTION 14: UPDATE LOGIC
  // ============================================================
  function update() {
    stateTimer++;
    titleAnimTimer++;
    updateParticles();

    if (flashTimer > 0) flashTimer--;

    if (netRipple.active) {
      netRipple.time++;
      if (netRipple.time > 40) netRipple.active = false;
    }

    switch (gameState) {
      case 'TITLE':
        break;

      case 'ROUND_START': {
        if (stateTimer >= 60) {
          changeState('READY');
        }
        break;
      }

      case 'READY':
        // idle sway for GK
        gk.x = GOAL_CENTER_X + Math.sin(stateTimer * 0.08) * 6;
        if (input.swipeReady) {
          input.swipeReady = false;
          changeState('RUNUP');
        }
        break;

      case 'RUNUP': {
        // Paradinha sub-behavior
        if (paradinhaActive) {
          paradinhaPauseTimer++;
          // Freeze kicker
          kicker.frame = 'stand';
          // GK anticipates: slowly commit to a random direction
          if (paradinhaGKAnticipation === 0) {
            // Choose a direction for GK anticipation
            stateData.paradinhaGKDir = Math.random() < 0.5 ? -1 : 1;
          }
          paradinhaGKAnticipation = Math.min(paradinhaPauseTimer / PARADINHA_MAX_PAUSE, 1);
          gk.x = GOAL_CENTER_X + stateData.paradinhaGKDir * paradinhaGKAnticipation * 20;

          // Auto-release after max pause time
          if (paradinhaPauseTimer >= PARADINHA_MAX_PAUSE) {
            paradinhaActive = false;
          }
          break;
        }

        // Normal RUNUP (or resumed after paradinha)
        const effectiveTimer = paradinhaUsed ? stateTimer - paradinhaPauseTimer : stateTimer;
        const prog = Math.min(effectiveTimer / KICKER_RUNUP_FRAMES, 1);
        kicker.y = KICKER_START_Y - prog * (KICKER_START_Y - PENALTY_SPOT_Y + 15);
        if (effectiveTimer < KICKER_RUNUP_FRAMES - 5) {
          kicker.frame = Math.floor(effectiveTimer / 5) % 2 === 0 ? 'run1' : 'run2';
        } else {
          kicker.frame = 'windup';
        }

        // At frame 15 of runup (without paradinha), decide GK dive
        if (!paradinhaUsed && effectiveTimer === 15 && !currentGKDecision) {
          currentGKDecision = decideGKDive(currentShot, false);
          gk.diveDir = currentGKDecision.direction;
          gk.diveIntensity = currentGKDecision.intensity;
        }

        // After paradinha released: GK direction is locked to what was revealed
        if (paradinhaUsed && !paradinhaActive && !currentGKDecision) {
          // GK already moved toward stateData.paradinhaGKDir — lock that in
          currentGKDecision = {
            direction: stateData.paradinhaGKDir || (Math.random() < 0.5 ? -1 : 1),
            intensity: 0.4 + Math.random() * 0.3, // reduced: GK already spent energy
          };
          gk.diveDir = currentGKDecision.direction;
          gk.diveIntensity = currentGKDecision.intensity;
        }

        if (effectiveTimer >= KICKER_RUNUP_FRAMES) {
          changeState('KICK');
        }
        break;
      }

      case 'KICK':
        kicker.frame = 'kick';
        if (stateTimer >= 6) {
          changeState('BALL_FLIGHT');
        }
        break;

      case 'BALL_FLIGHT': {
        const flightLen = ball.flightFrames || BALL_FLIGHT_FRAMES;
        const gravity = ball.shotType === 'panenka' ? 0.04 : 0.06;

        // Slow-motion: check if we're in the last N physics frames
        const slowMoTrigger = (currentShot && currentShot.shotType !== 'normal')
          ? SLOWMO_TRIGGER_FRAMES + 4 : SLOWMO_TRIGGER_FRAMES;
        const physFramesLeft = flightLen - (stateData.physicsFrames || 0);
        let skipPhysics = false;
        if (physFramesLeft <= slowMoTrigger && physFramesLeft > 0) {
          if (!slowMoActive) slowMoActive = true;
          slowMoCounter++;
          if (slowMoCounter % SLOWMO_FRAME_DURATION !== 0) {
            skipPhysics = true;
          }
        }

        if (!skipPhysics) {
          // Ball physics
          if (ball.inFlight) {
            ball.x += ball.vx;
            ball.y += ball.vy;
            ball.vx += ball.curve;
            ball.z += ball.vz;
            ball.vz -= gravity;
            if (ball.z < 0) ball.z = 0;

            // Record trail for curve shots
            if (ball.shotType === 'curve' && stateData.physicsFrames % 2 === 0) {
              ballTrail.push({ x: ball.x, y: ball.y - ball.z * 2, alpha: 1 });
              if (ballTrail.length > 15) ballTrail.shift();
            }
          }

          stateData.physicsFrames = (stateData.physicsFrames || 0) + 1;

          // GK dive (uses physics frames for consistency)
          if (stateData.physicsFrames >= stateData.gkDiveStart) {
            gk.diveProgress = Math.min((stateData.physicsFrames - stateData.gkDiveStart) / GK_DIVE_FRAMES, 1);
            const reach = GK_REACH * gk.diveProgress * gk.diveIntensity;
            gk.x = gk.baseX + gk.diveDir * reach;

            if (gk.diveDir < 0) {
              gk.frame = gk.diveProgress < 0.4 ? 'diveL1' : 'diveL2';
            } else if (gk.diveDir > 0) {
              gk.frame = gk.diveProgress < 0.4 ? 'diveR1' : 'diveR2';
            } else {
              gk.frame = gk.diveProgress < 0.3 ? 'ready' : 'diveC';
            }
          }

          // End of flight
          if (stateData.physicsFrames >= flightLen) {
            ball.inFlight = false;
            changeState('RESULT');
          }
        }

        // Fade trail (always runs, even in slow-mo)
        for (let i = 0; i < ballTrail.length; i++) {
          ballTrail[i].alpha *= 0.92;
        }

        break;
      }

      case 'RESULT':
        if (stateTimer >= RESULT_DISPLAY_FRAMES) {
          advanceGame();
        }
        break;

      case 'GAME_OVER':
        break;
    }
  }

  // ============================================================
  // SECTION 15: RENDER
  // ============================================================
  function getKickerSprite() {
    switch (kicker.frame) {
      case 'run1': return KICKER_RUN1;
      case 'run2': return KICKER_RUN2;
      case 'windup': return KICKER_WINDUP;
      case 'kick': return KICKER_KICK;
      default: return KICKER_STAND;
    }
  }

  function getGKSprite() {
    switch (gk.frame) {
      case 'diveL1': return GK_DIVE_L1;
      case 'diveL2': return GK_DIVE_L2;
      case 'diveR1': return GK_DIVE_R1;
      case 'diveR2': return GK_DIVE_R2;
      case 'diveC': return GK_DIVE_C;
      case 'stand': return GK_STAND;
      default: return GK_READY;
    }
  }

  function drawBallTrail() {
    if (ballTrail.length < 2) return;
    for (let i = 0; i < ballTrail.length; i++) {
      const t = ballTrail[i];
      const size = 2 + (i / ballTrail.length) * 3;
      ctx.fillStyle = ball.shotType === 'curve' ? '#60a0ff' : '#ffffff';
      ctx.globalAlpha = t.alpha * 0.6;
      ctx.beginPath();
      ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawBallEntity() {
    if (!ball.visible) return;

    // Draw trail behind ball (curve shots)
    if (ball.inFlight && ball.shotType === 'curve') {
      drawBallTrail();
    }

    // Shadow
    const shadowScale = Math.max(0.3, 1 - ball.z * 0.015);
    ctx.fillStyle = COLORS.ballShadow;
    ctx.globalAlpha = 0.35;
    ctx.beginPath();
    ctx.ellipse(ball.x, ball.y, ball.radius * shadowScale, ball.radius * shadowScale * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Ball
    const visualY = ball.y - ball.z * 2;
    ctx.fillStyle = COLORS.ball;
    ctx.beginPath();
    ctx.arc(ball.x, visualY, ball.radius, 0, Math.PI * 2);
    ctx.fill();
    // Pattern
    ctx.fillStyle = '#c0c0c0';
    ctx.fillRect(ball.x - 0.5, visualY - ball.radius * 0.5, 1, ball.radius);
    ctx.fillRect(ball.x - ball.radius * 0.5, visualY - 0.5, ball.radius, 1);
  }

  function drawSwipeIndicator() {
    if (!input.active || gameState !== 'READY') return;
    const dx = input.endX - input.startX;
    const dy = input.endY - input.startY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 8) return;

    const power = Math.min(dist / SWIPE_MAX_DIST, 1);
    const elapsed = performance.now() - input.startTime;
    const swipeAngle = Math.atan2(dx, -dy);
    const maxAngle = Math.PI / 3;
    const angleRatio = Math.max(-1, Math.min(1, swipeAngle / maxAngle));

    // Detect current gesture type for visual feedback
    const { perpDist } = calculatePathCurvature();
    const isCurveGesture = perpDist > CURVE_MIN_PERP_DIST && dist > 40;
    const isPanenkaGesture = dist < PANENKA_MAX_DIST && elapsed > PANENKA_MIN_TIME && Math.abs(angleRatio) < PANENKA_MAX_ANGLE;

    let lineColor = 'rgba(255,255,255,0.5)';
    let labelText = '';
    if (isCurveGesture) {
      lineColor = 'rgba(96,160,255,0.7)'; // blue for curve
      labelText = 'CURVA!';
    } else if (isPanenkaGesture) {
      lineColor = 'rgba(232,200,32,0.7)'; // golden for panenka
      labelText = 'PANENKA';
    }

    // Draw the swipe path as a line (curved for curve gesture)
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    if (isCurveGesture && input.path.length > 2) {
      // Draw the actual curved path
      ctx.beginPath();
      ctx.moveTo(input.path[0].x, input.path[0].y);
      for (let i = 1; i < input.path.length; i++) {
        ctx.lineTo(input.path[i].x, input.path[i].y);
      }
      ctx.lineTo(input.endX, input.endY);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.moveTo(input.startX, input.startY);
      ctx.lineTo(input.endX, input.endY);
      ctx.stroke();
    }
    ctx.setLineDash([]);

    // Arrow head
    const angle = Math.atan2(dy, dx);
    ctx.fillStyle = lineColor.replace('0.5', '0.6').replace('0.7', '0.8');
    ctx.beginPath();
    ctx.moveTo(input.endX, input.endY);
    ctx.lineTo(input.endX - 10 * Math.cos(angle - 0.4), input.endY - 10 * Math.sin(angle - 0.4));
    ctx.lineTo(input.endX - 10 * Math.cos(angle + 0.4), input.endY - 10 * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fill();

    // Power bar
    const barW = 40;
    const barH = 5;
    const bx = input.startX - barW / 2;
    const by = input.startY + 15;
    ctx.fillStyle = '#333';
    ctx.fillRect(bx, by, barW, barH);
    ctx.fillStyle = power < 0.4 ? '#40e840' : power < 0.75 ? '#e8e840' : '#e84040';
    ctx.fillRect(bx, by, barW * power, barH);

    // Shot type label
    if (labelText) {
      const labelColor = isCurveGesture ? '#60a0ff' : '#e8c820';
      drawTextCentered(labelText, input.startY + 28, 1.5, labelColor);
    }
  }

  function drawScoreboard() {
    // Background
    ctx.fillStyle = COLORS.scoreBg;
    ctx.fillRect(0, 0, DESIGN_W, 55);

    // Streak label (left)
    drawText('STREAK', 12, 6, 1.5, '#a0a0a0');

    // Big streak number (center)
    const streakStr = '' + game.streak;
    drawTextCentered(streakStr, 2, 4, '#e8c820');

    // Best label (right)
    drawText('BEST ' + game.bestStreak, 270, 6, 1.5, '#808080');

    // Recent results strip (last 10)
    const indicatorY = 45;
    const maxDots = 10;
    const startIdx = Math.max(0, game.results.length - maxDots);
    const dotsToShow = game.results.slice(startIdx);
    const totalW = dotsToShow.length * 12;
    const dotStartX = (DESIGN_W - totalW) / 2 + 6;
    for (let i = 0; i < dotsToShow.length; i++) {
      drawPenaltyDot(dotStartX + i * 12, indicatorY, dotsToShow[i].result);
    }
  }

  function drawPenaltyDot(x, y, result) {
    if (result === 'goal') {
      ctx.fillStyle = COLORS.goalText;
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
    } else if (result === 'save' || result === 'miss') {
      ctx.strokeStyle = COLORS.saveText;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x - 3, y - 3); ctx.lineTo(x + 3, y + 3);
      ctx.moveTo(x + 3, y - 3); ctx.lineTo(x - 3, y + 3);
      ctx.stroke();
    } else {
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawResultOverlay() {
    if (gameState !== 'RESULT') return;
    const flash = Math.floor(stateTimer / 10) % 2 === 0;
    if (!flash && stateTimer < 60) return;

    let text, color;
    switch (stateData.result) {
      case 'goal':
        // Special texts for special shot goals
        if (stateData.shotType === 'curve') {
          text = 'GOLAZO!'; color = '#60ff60';
        } else if (stateData.shotType === 'panenka') {
          text = 'PANENKA!'; color = '#e8c820';
        } else {
          text = 'GOAL!'; color = COLORS.goalText;
        }
        break;
      case 'save': text = 'SAVED!'; color = COLORS.saveText; break;
      default: text = 'MISS!'; color = COLORS.missText; break;
    }
    drawTextCentered(text, 300, 5, color);

    // Show shot type subtitle for special shots even on miss/save
    if (stateData.shotType === 'curve' && stateData.result !== 'goal') {
      drawTextCentered('CURVA', 345, 2, '#6090c0');
    } else if (stateData.shotType === 'panenka' && stateData.result !== 'goal') {
      drawTextCentered('PANENKA', 345, 2, '#c0a020');
    }
  }

  function drawParadinhaIndicator() {
    if (gameState !== 'RUNUP' || !paradinhaActive) return;
    // Blinking "!" above kicker
    if (Math.floor(paradinhaPauseTimer / 4) % 2 === 0) {
      drawText('!', kicker.x - 3, kicker.y - 58, 3, '#e84040');
    }
    // Pause timer bar showing how much time is left
    const remaining = 1 - paradinhaPauseTimer / PARADINHA_MAX_PAUSE;
    const barW = 30;
    const barH = 3;
    ctx.fillStyle = '#333';
    ctx.fillRect(kicker.x - barW / 2, kicker.y - 48, barW, barH);
    ctx.fillStyle = remaining > 0.4 ? '#e8c820' : '#e84040';
    ctx.fillRect(kicker.x - barW / 2, kicker.y - 48, barW * remaining, barH);
  }

  function drawReadyPrompt() {
    if (gameState !== 'READY') return;
    if (Math.floor(stateTimer / 25) % 2 === 0) {
      drawTextCentered('SWIPE TO SHOOT', 570, 2, '#f0f0f0');
    }
  }

  function drawTitleScreen() {
    drawSky();
    drawCrowd();
    drawPitch();
    drawGoalNet();
    drawGoalPosts();

    // Overlay
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);

    // Title
    drawTextCentered('PENALTY', 150, 6, '#f0f0f0');
    drawTextCentered('KICK', 195, 6, '#e8c820');

    // Subtitle
    drawTextCentered('SUPERSTAR', 260, 3, '#40e840');

    // High score
    if (game.highScore > 0) {
      drawTextCentered('BEST: ' + game.highScore, 295, 2.5, '#e8c820');
    }

    // Ball decoration
    ctx.fillStyle = COLORS.ball;
    ctx.beginPath();
    ctx.arc(GOAL_CENTER_X, 330, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#b0b0b0';
    ctx.fillRect(GOAL_CENTER_X - 1, 322, 2, 16);
    ctx.fillRect(GOAL_CENTER_X - 8, 329, 16, 2);

    // Tap to start
    if (Math.floor(titleAnimTimer / 30) % 2 === 0) {
      drawTextCentered('TAP TO START', 440, 2.5, '#f0f0f0');
    }

    // Credits
    drawTextCentered('RETRO EDITION', 520, 1.5, '#707070');
  }

  function drawGameOverScreen() {
    if (gameState !== 'GAME_OVER') return;

    ctx.fillStyle = 'rgba(0,0,0,0.82)';
    ctx.fillRect(0, 80, DESIGN_W, 500);

    // Title
    drawTextCentered('GAME OVER', 105, 4, '#f0f0f0');

    // Big goal number
    const goalsStr = '' + game.totalGoals;
    drawTextCentered(goalsStr, 160, 8, '#e8c820');
    drawTextCentered('GOALS', 215, 2.5, '#c0a020');

    // New best indicator
    if (stateData.isNewBest && Math.floor(stateTimer / 12) % 2 === 0) {
      drawTextCentered('NEW BEST!', 248, 3, '#40e840');
    }

    // Stats table
    const statsY = 285;
    const lineH = 22;
    const labelX = 60;
    const valX = 280;

    const stats = [
      ['SHOTS', '' + game.totalShots],
      ['GOALS', '' + game.totalGoals],
      ['STREAK', '' + game.streak],
      ['CURVES', '' + game.specialCounts.curve],
      ['PANENKAS', '' + game.specialCounts.panenka],
      ['PARADINHAS', '' + game.specialCounts.paradinha],
    ];

    for (let i = 0; i < stats.length; i++) {
      const y = statsY + i * lineH;
      drawText(stats[i][0], labelX, y, 1.8, '#a0a0a0');
      const valW = measureText(stats[i][1], 1.8);
      drawText(stats[i][1], valX - valW, y, 1.8, '#f0f0f0');
    }

    // Best score
    drawTextCentered('BEST: ' + game.highScore, 430, 2, '#808080');

    // Tap to restart
    if (Math.floor(stateTimer / 30) % 2 === 0) {
      drawTextCentered('TAP TO RESTART', 470, 2, '#f0f0f0');
    }
  }

  function render() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    beginDraw();

    if (gameState === 'TITLE') {
      drawTitleScreen();
    } else {
      // Flash effect
      if (flashTimer > 0) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);
        endDraw();
        return;
      }

      drawSky();
      drawCrowd();
      drawPitch();
      drawGoalNet();

      // Draw GK (behind goal posts if not diving far)
      const gkSprite = getGKSprite();
      const gkPS = 3;
      const gkSpriteW = gkSprite[0].length * gkPS;
      const gkSpriteH = gkSprite.length * gkPS;
      drawSprite(gkSprite, gk.x - gkSpriteW / 2, gk.y - gkSpriteH + 10, gkPS, false);

      drawGoalPosts();

      // Draw ball
      drawBallEntity();

      // Draw kicker
      const kickSprite = getKickerSprite();
      const kPS = 3;
      const kSpriteW = kickSprite[0].length * kPS;
      const kSpriteH = kickSprite.length * kPS;
      drawSprite(kickSprite, kicker.x - kSpriteW / 2, kicker.y - kSpriteH + 5, kPS, false);

      drawParticles();
      drawSwipeIndicator();
      drawParadinhaIndicator();
      drawScoreboard();
      drawResultOverlay();
      drawReadyPrompt();

      // Slow-mo vignette
      if (slowMoActive && gameState === 'BALL_FLIGHT') {
        const grd = ctx.createRadialGradient(DESIGN_W/2, DESIGN_H/2, DESIGN_W*0.35, DESIGN_W/2, DESIGN_H/2, DESIGN_W*0.7);
        grd.addColorStop(0, 'rgba(0,0,0,0)');
        grd.addColorStop(1, 'rgba(0,0,0,0.25)');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, DESIGN_W, DESIGN_H);
      }

      drawGameOverScreen();
    }

    endDraw();
  }

  // ============================================================
  // SECTION 16: GAME LOOP
  // ============================================================
  let lastTime = 0;
  const FRAME_DUR = 1000 / 60;

  function gameLoop(ts) {
    const delta = ts - lastTime;
    if (delta >= FRAME_DUR) {
      lastTime = ts - (delta % FRAME_DUR);
      update();
      render();
    }
    requestAnimationFrame(gameLoop);
  }

  // ============================================================
  // SECTION 17: INIT
  // ============================================================
  function init() {
    initCanvas();
    initInput();
    loadHighScores();
    generateCrowd();
    changeState('TITLE');
    requestAnimationFrame(gameLoop);
  }

  init();
  </script>
</body>
</html>
